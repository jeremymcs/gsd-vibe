<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- GSD Vibe - App icon: bold GSD logomark on black with cyan accent -->
  <!-- Copyright (c) 2026 Jeremy McSpadden <jeremy@fluxlabs.net> -->

  <!-- Pure black background — no rounding (Tauri handles macOS corners) -->
  <rect x="0" y="0" width="512" height="512" fill="#000000"/>

  <!-- Bold "GSD" text — white, geometric sans-serif, ~70% canvas width -->
  <!-- Vertically centered with slight upward bias to leave room for accent underline -->
  <text
    x="256"
    y="275"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="800"
    font-size="195"
    letter-spacing="4"
    fill="#FFFFFF"
  >GSD</text>

  <!-- Cyan accent underline: hsl(189 94% 43%) = #0cb4ce -->
  <!-- Approximately 65% of canvas width, centered, 7px tall, 30px below text baseline -->
  <rect
    x="89"
    y="335"
    width="334"
    height="8"
    rx="4"
    fill="#0cb4ce"
  />
</svg>

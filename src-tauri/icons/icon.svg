    <path d="M 0 150 L 140 -160 L 138 -158 L 2 150 Z" fill="#ffffff" fill-opacity="0.2" />
  </g>
  <rect x="220" y="440" width="72" height="6" rx="3" fill="#22d3ee" fill-opacity="0.3" />
</svg>
